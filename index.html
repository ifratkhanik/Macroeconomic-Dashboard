    body.spark-widget-shell .slider::-webkit-slider-thumb{-webkit-appearance:none;height:24px;width:10px;border-radius:999px;background:var(--surface);margin-top:-10px;border:3px solid var(--on-surface);box-shadow:-4px 0 0 var(--surface),4px 0 0 var(--surface);transition:all .2s cubic-bezier(.2,1.2,.2,1)}body.spark-widget-shell .slider:active::-webkit-slider-thumb{border-width:4px;transform:scale(1.1)}body.spark-widget-shell .slider:focus-visible::-webkit-slider-thumb{box-shadow:-4px 0 0 var(--surface),4px 0 0 var(--surface),0 0 0 2px var(--surface),0 0 0 3px var(--on-surface)}
    body.spark-widget-shell .slider-input{width:60px;height:48px;border:none;background:var(--surface-dim);border-radius:16px;font-variant-numeric:tabular-nums;padding:8px 12px;color:var(--on-surface);line-height:20px;letter-spacing:0;text-align:center;outline:none;transition:.2s;-moz-appearance:textfield}body.spark-widget-shell .row-slider .slider-input{font-family:"Google Sans Code",var(--ff-mono);font-size:15px;font-style:normal;font-weight:300}body.spark-widget-shell .widget-container .slider-input{border-radius:16px;vertical-align:middle}body.spark-widget-shell .row-slider .slider-input{text-align:center}body.spark-widget-shell .slider-input:focus{box-shadow:0 0 0 2px var(--surface),0 0 0 3px var(--on-surface)}body.spark-widget-shell .slider-input::-webkit-inner-spin-button,body.spark-widget-shell .slider-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}body.spark-widget-shell .slider-input[type=number]{appearance:textfield}
    body.spark-widget-shell .canvas-tag,body.spark-widget-shell .d3-tooltip{backdrop-filter:blur(8px);text-shadow:0 0 5px rgb(from var(--surface) r g b/90%)}
    </style>
    <script>
      window['CALLER_ID'] = 'spark';
    </script>
</head>
<body class="spark-widget-shell">
<script>
const HISTORICAL_YEARS = [2022, 2023, 2024, 2025, 2026];
const BD_INFLATION = [7.5, 9.0, 9.7, 9.9, 9.42]; // Updated 2026 May point to official 9.42%
const US_INFLATION = [8.0, 4.1, 3.2, 2.9, 3.8];
const BRENT_CRUDE = [94.0, 82.0, 83.0, 85.0, 79.63];
const BD_REPO = [5.0, 6.5, 8.0, 8.5, 10.0];

const YIELD_BASE = [
    { tenor: '91D', yield: 10.15, days: 91 },
    { tenor: '182D', yield: 10.25, days: 182 },
    { tenor: '1Y', yield: 10.33, days: 365 },
    { tenor: '5Y', yield: 10.63, days: 1825 },
    { tenor: '10Y', yield: 10.88, days: 3650 },
    { tenor: '20Y', yield: 11.20, days: 7300 }
];

const MACRO_GRID = [
    { indicator: 'Inflation (CPI)', bd: '9.42%', us: '3.8%', context: 'BBS May Peak' }, // Synchronized May 2026
    { indicator: 'Policy Rate', bd: '10.0%', us: '3.65%', context: 'Tightening' },
    { indicator: 'GDP Growth', bd: '4.0%', us: '2.2%', context: 'BD Slowing' },
    { indicator: 'FX Reserves', bd: '$26.7B', us: 'N/A', context: 'Stabilizing' },
    { indicator: 'Brent Crude', bd: '$79.63', us: '$79.63', context: 'Energy Risk' }
];

const BANKING_GRID = [
    { metric: 'Excess Liquidity', value: '2.38T BDT', status: 'Stable' },
    { metric: 'W.Avg Lending Rate', value: '12.11%', status: 'Rising' },
    { metric: 'Deposit Rate', value: '9.59%', status: 'Competitive' },
    { metric: 'Spread', value: '2.52%', status: 'Compressed' },
    { metric: 'USD/BDT (Spot)', value: '118.0', status: 'Managed Float' }
];

// Map historical data to long format for Plot
const LONG_HISTORY = [];
HISTORICAL_YEARS.forEach((year, i) => {
    LONG_HISTORY.push({ year, value: BD_INFLATION[i], series: 'BD Inflation' });
    LONG_HISTORY.push({ year, value: US_INFLATION[i], series: 'US Inflation' });
    LONG_HISTORY.push({ year, value: BD_REPO[i], series: 'BD Repo Rate' });
});

const { state, ui } = WH.createApp({
    params: {
        tab: { 
            type: 'stepper', 
            value: 'Macro Matrix', 
            options: ["Macro Matrix", "G-Sec Yield Curve", "Comparative Workspace", "Banking Health"], 
            label: "Navigation" 
        },
        shift: { 
            value: 0, 
            min: -100, 
            max: 100, 
            step: 10, 
            label: "Yield Shift (bps)",
            desc: "Simulate a parallel shift in the G-Sec Yield Curve in basis points."
        }
    },
    editorial: {
        hud: [
            { label: "USD/BDT", value: "118.0" },
            { label: "Repo Rate", value: "10.0%" },
            { label: "Excess Liquidity", value: "2.38T BDT" }
        ]
    }
});

// Sync internal state variables
state.macroData = MACRO_GRID;
state.yieldCurve = YIELD_BASE;
state.bankingData = BANKING_GRID;
state.history = LONG_HISTORY;

WH.initTable('viz', ({ state }) => {
    const currentTab = state.tab;
    
    if (currentTab === 'Macro Matrix') {
        return {
            data: [...state.macroData],
            columns: [
                { key: 'indicator', label: 'Indicator' },
                { key: 'bd', label: 'Bangladesh', format: (v) => `<b>${v}</b>` },
                { key: 'us', label: 'United States' },
                { key: 'context', label: 'Market Context' }
            ]
        };
    }
    
    if (currentTab === 'Banking Health') {
        return {
            data: [...state.bankingData],
            columns: [
                { key: 'metric', label: 'Metric' },
                { key: 'value', label: 'Current Value', format: (v) => `<span style="color:var(--primary)">${v}</span>` },
                { key: 'status', label: 'Status' }
            ]
        };
    }

    return null;
});

WH.initPlot('viz', ({ width, state }) => {
    const currentTab = state.tab;

    if (currentTab === 'G-Sec Yield Curve') {
        const shiftVal = state.shift / 100; // bps to percent
        const plotData = [...state.yieldCurve].map(d => ({
            ...d,
            adjustedYield: d.yield + shiftVal
        }));

        return {
            width,
            x: { label: "Tenor", domain: plotData.map(d => d.tenor) },
            y: { label: "Yield (%)", grid: true, domain: [9, 13] },
            color: { scheme: "blues" },
            marks: [
                // Reference line (original)
                Plot.lineY(plotData, { 
                    x: "tenor", 
                    y: "yield", 
                    stroke: WH.getColor('--on-surface-default'), 
                    strokeDasharray: "4,4",
                    strokeOpacity: 0.5 
                }),
                // Main Shifted Line
                Plot.lineY(plotData, { 
                    x: "tenor", 
                    y: "adjustedYield", 
                    stroke: WH.getColor('--primary'), 
                    strokeWidth: 3 
                }),
                // Dots for interactivity
                Plot.dot(plotData, { 
                    x: "tenor", 
                    y: "adjustedYield", 
                    fill: WH.getColor('--primary'), 
                    r: 5, 
                    tip: true 
                }),
                // Labels for the shifted values
                Plot.text(plotData, {
                    x: "tenor",
                    y: "adjustedYield",
                    text: d => `${d.adjustedYield.toFixed(2)}%`,
                    dy: -15,
                    fill: WH.getColor('--on-surface-default'),
                    fontSize: 10
                })
            ]
        };
    }

    if (currentTab === 'Comparative Workspace') {
        const plotData = [...state.history];
        
        return {
            width,
            x: { label: "Year", tickFormat: "d" },
            y: { label: "Value (%)", grid: true },
            color: { 
                legend: true,
                scheme: "tableau10" 
            },
            marks: [
                Plot.lineY(plotData, { 
                    x: "year", 
                    y: "value", 
                    stroke: "series", 
                    strokeWidth: 2 
                }),
                Plot.dot(plotData, { 
                    x: "year", 
                    y: "value", 
                    fill: "series", 
                    tip: true 
                })
            ]
        };
    }

    return { marks: [] };
});

state._subscribe('shift', (val) => {
    if (state.tab === 'G-Sec Yield Curve') {
        const avg = (10.15 + 11.20) / 2 + (val / 100);
        ui.setEditorial({
            hud: [
                { label: "Avg Yield", value: avg.toFixed(2) + "%" },
                { label: "Curve Shift", value: (val > 0 ? "+" : "") + val + " bps" },
                { label: "Liquidity", value: "2.38T BDT" }
            ]
        });
    }
});

// Reset HUD to base conditions when shifting tabs
state._subscribe('tab', (val) => {
    if (val === 'Macro Matrix' || val === 'Banking Health') {
        ui.setEditorial({
            hud: [
                { label: "USD/BDT", value: "118.0" },
                { label: "Repo Rate", value: "10.0%" },
                { label: "Excess Liquidity", value: "2.38T BDT" }
            ]
        });
    }
});
</script>
</body>
</html>
